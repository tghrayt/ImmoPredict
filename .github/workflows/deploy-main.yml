name: deploy-main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ./ImmoPredict.Api/ImmoPredict.Api.csproj

      - name: Build
        run: dotnet build ./ImmoPredict.Api/ImmoPredict.Api.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test ./ImmoPredict.Api/ImmoPredict.Api.csproj --no-build --configuration Release

  build-push-api:
    runs-on: ubuntu-latest
    needs: build-test-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ImmoPredict.Api/Dockerfile
          push: true
          tags: tghrayt/immopredict-api:latest

  build-push-front:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Front image
        uses: docker/build-push-action@v6
        with:
          context: ./ImmoPredict.Client
          file: ./ImmoPredict.Client/Dockerfile
          push: true
          tags: tghrayt/immopredict-front:latest

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-push-api
      - build-push-front

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" << 'EOF'
            cd /opt/Immopredict
            docker compose pull
            docker compose up -d
            docker compose ps
          EOF