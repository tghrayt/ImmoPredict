name: deploy-main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore API
        run: dotnet restore ./ImmoPredict.Api/ImmoPredict.Api.csproj

      - name: Build API
        run: dotnet build ./ImmoPredict.Api/ImmoPredict.Api.csproj --no-restore --configuration Release

      - name: Test API
        run: dotnet test ./ImmoPredict.Api/ImmoPredict.Api.csproj --no-build --configuration Release

  build-push-api:
    runs-on: ubuntu-latest
    needs: build-test-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ImmoPredict.Api/Dockerfile
          push: true
          tags: |
            tghrayt/immopredict-api:latest
            tghrayt/immopredict-api:${{ github.sha }}

  build-push-front:
    runs-on: ubuntu-latest
    needs: build-test-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Front image
        uses: docker/build-push-action@v6
        with:
          context: ./ImmoPredict.Client
          file: ./ImmoPredict.Client/Dockerfile
          push: true
          tags: |
            tghrayt/immopredict-client:latest
            tghrayt/immopredict-client:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-push-api
      - build-push-front

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy Kubernetes manifests to VM
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" "rm -rf /tmp/immopredict-k8s && mkdir -p /tmp/immopredict-k8s"
          scp -i ~/.ssh/id_ed25519 -r ./k8s/* "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/immopredict-k8s/"

      - name: Deploy to K3s
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" << EOF
            set -e

            sudo kubectl apply -f /tmp/immopredict-k8s/

            sudo kubectl set image deployment/immopredict-api \
              immopredict-api=tghrayt/immopredict-api:${{ github.sha }}

            sudo kubectl set image deployment/immopredict-client \
              immopredict-client=tghrayt/immopredict-client:${{ github.sha }}

            sudo kubectl rollout status deployment/immopredict-api --timeout=180s
            sudo kubectl rollout status deployment/immopredict-client --timeout=180s

            echo "===== Pods ====="
            sudo kubectl get pods -o wide

            echo "===== Services ====="
            sudo kubectl get svc

            echo "===== Ingress ====="
            sudo kubectl get ingress
          EOF